<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PageSnap — Annotate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1d2026;
      --surface3: #252830;
      --border: rgba(255,255,255,.07);
      --border2: rgba(255,255,255,.14);
      --text: #f0f0f2;
      --muted: rgba(240,240,242,.45);
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,.12);
      --danger: #ff4466;
      --yellow: #FFBE00;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
      --toolbar-h: 56px;
      --sidebar-w: 220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Toolbar ── */
    #toolbar {
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 6px;
      flex-shrink: 0;
      z-index: 10;
    }

    .tb-logo {
      display: flex; align-items: center; gap: 7px;
      font-size: 14px; font-weight: 800; margin-right: 10px;
      color: var(--accent);
    }
    .tb-logo svg { opacity: .85; }

    .tb-sep { width: 1px; height: 24px; background: var(--border2); margin: 0 6px; }

    .tb-group { display: flex; align-items: center; gap: 3px; }

    .tool-btn {
      width: 36px; height: 36px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 140ms;
      position: relative;
    }
    .tool-btn:hover { color: var(--text); background: var(--surface2); }
    .tool-btn.active { color: var(--accent); background: var(--accent-dim); border-color: rgba(0,229,160,.3); }
    .tool-btn .tooltip {
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 10px;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity 120ms;
    }
    .tool-btn:hover .tooltip { opacity: 1; }

    /* Colour swatches in toolbar */
    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: all 140ms; flex-shrink: 0;
    }
    .color-swatch.active { border-color: var(--text); transform: scale(1.2); }

    /* Size slider */
    .size-row { display: flex; align-items: center; gap: 8px; }
    .size-label { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 24px; text-align: right; }
    input[type=range].tb-range {
      -webkit-appearance: none; width: 80px; height: 3px;
      background: var(--surface3); border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type=range].tb-range::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    /* Opacity slider */
    .opacity-row { display: flex; align-items: center; gap: 8px; }
    .opacity-label { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 30px; text-align: right; }

    /* Right-side actions */
    .tb-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }

    .btn-action {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--font); font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: all 140ms;
    }
    .btn-action:hover { border-color: var(--border2); background: var(--surface3); }
    .btn-action.primary { background: var(--accent); color: #0a0b0d; border-color: var(--accent); box-shadow: 0 0 12px rgba(0,229,160,.2); }
    .btn-action.primary:hover { opacity: .88; }
    .btn-action.danger { color: var(--danger); border-color: rgba(255,68,102,.25); }
    .btn-action.danger:hover { background: rgba(255,68,102,.1); }

    /* Undo/redo */
    .tb-undoredo { display: flex; gap: 2px; }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      overflow: auto;
      background: #080909;
      background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 20px 20px;
      /* Padding gives breathing room; inline-block on container means it scrolls correctly */
      padding: 40px;
    }

    #canvas-container {
      position: relative;
      display: inline-block;  /* shrink-wraps to CSS canvas size */
      box-shadow: 0 8px 48px rgba(0,0,0,.6);
      /* Ensures scrollable area is always at least the visible area */
      min-width: 1px;
      min-height: 1px;
    }

    #base-canvas {
      display: block;
      /* CSS width/height set by JS to implement zoom */
    }
    #anno-canvas {
      display: block;
      position: absolute; top: 0; left: 0;
      pointer-events: none;
      /* committed annotations — kept separate so the eraser never damages the screenshot */
    }
    #draw-canvas {
      display: block;
      position: absolute; top: 0; left: 0;
      cursor: crosshair;
      /* CSS width/height must match base-canvas exactly */
    }

    /* ── Loading / empty state ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; font-size: 14px; color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px; border: 2px solid var(--surface3);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Zoom controls ── */
    .zoom-controls {
      display: flex; align-items: center; gap: 2px;
    }
    .zoom-btn {
      width: 30px; height: 30px;
      border: 1px solid transparent; border-radius: 6px;
      background: none; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 12px; font-weight: 500;
      transition: all 140ms;
    }
    .zoom-btn:hover { color: var(--text); background: var(--surface2); }
    .zoom-btn.active { color: var(--accent); background: var(--accent-dim); }
    #zoom-display {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      min-width: 44px; text-align: center; cursor: pointer;
      padding: 4px 6px; border-radius: 6px; transition: all 140ms;
    }
    #zoom-display:hover { color: var(--text); background: var(--surface2); }

    /* ── Status bar ── */
    #statusbar {
      height: 26px; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 16px;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      flex-shrink: 0;
    }
    #statusbar span { display: flex; align-items: center; gap: 5px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 7px 16px; border-radius: 99px; z-index: 999;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transition: opacity 200ms; opacity: 0; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Custom color picker button */
    #color-custom {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2);
      cursor: pointer; overflow: hidden; background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      flex-shrink: 0;
    }
    #color-custom input[type=color] {
      opacity: 0; width: 100%; height: 100%; cursor: pointer; border: none; padding: 0;
    }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Loading image…</span></div>

<div id="app" style="display:none">
  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <div class="tb-logo">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="1" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="11" cy="11" r="4" fill="currentColor"/>
        <circle cx="17" cy="5" r="1.5" fill="var(--accent)"/>
      </svg>
      Annotate
    </div>

    <div class="tb-sep"></div>

    <!-- Drawing tools -->
    <div class="tb-group">
      <button class="tool-btn active" data-tool="pen" id="tool-pen">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M13 2.5l2.5 2.5L5 15.5H2.5V13L13 2.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <span class="tooltip">Pen (P)</span>
      </button>
      <button class="tool-btn" data-tool="line" id="tool-line">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="3" y1="15" x2="15" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="tooltip">Line (L)</span>
      </button>
      <button class="tool-btn" data-tool="arrow" id="tool-arrow">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 15L13 5M9 5h4v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tooltip">Arrow (A)</span>
      </button>
      <button class="tool-btn" data-tool="rect" id="tool-rect">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="4" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        <span class="tooltip">Rectangle (R)</span>
      </button>
      <button class="tool-btn" data-tool="ellipse" id="tool-ellipse">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="9" rx="6.5" ry="5" stroke="currentColor" stroke-width="1.4"/></svg>
        <span class="tooltip">Ellipse (E)</span>
      </button>
      <button class="tool-btn" data-tool="text" id="tool-text">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 4h12M9 4v10M6 14h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span class="tooltip">Text (T)</span>
      </button>
      <button class="tool-btn" data-tool="blur" id="tool-blur">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="5" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/><line x1="7" y1="5" x2="7" y2="13" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="11" y1="5" x2="11" y2="13" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
        <span class="tooltip">Blur / Redact (B)</span>
      </button>
      <button class="tool-btn" data-tool="highlight" id="tool-highlight">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="6" width="12" height="7" rx="1" fill="currentColor" opacity=".3"/><rect x="3" y="6" width="12" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
        <span class="tooltip">Highlight (H)</span>
      </button>
      <button class="tool-btn" data-tool="eraser" id="tool-eraser">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M14 4L7 14H4l-1-1 7-10 4 1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="3" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span class="tooltip">Eraser (X)</span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Colors -->
    <div class="tb-group" id="color-palette">
      <button class="color-swatch active" data-color="#FF3B5C" style="background:#FF3B5C" title="Red"></button>
      <button class="color-swatch" data-color="#00e5a0" style="background:#00e5a0" title="Teal"></button>
      <button class="color-swatch" data-color="#FFBE00" style="background:#FFBE00" title="Yellow"></button>
      <button class="color-swatch" data-color="#4D9FFF" style="background:#4D9FFF" title="Blue"></button>
      <button class="color-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
      <button class="color-swatch" data-color="#000000" style="background:#000000;border-color:var(--border2)" title="Black"></button>
      <div id="color-custom" title="Custom colour"><input type="color" id="color-picker-input" value="#FF3B5C" /></div>
    </div>

    <div class="tb-sep"></div>

    <!-- Size -->
    <div class="size-row">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" opacity=".4"><circle cx="7" cy="7" r="4" stroke="currentColor" stroke-width="1.3"/></svg>
      <input type="range" class="tb-range" id="size-slider" min="1" max="40" value="3" />
      <span class="size-label" id="size-val">3</span>
    </div>

    <div class="tb-sep"></div>

    <!-- Opacity -->
    <div class="opacity-row">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" stroke-dasharray="2 2"/></svg>
      <input type="range" class="tb-range" id="opacity-slider" min="10" max="100" value="100" />
      <span class="opacity-label" id="opacity-val">100%</span>
    </div>

    <div class="tb-sep"></div>

    <!-- Undo / Redo -->
    <div class="tb-undoredo">
      <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 7H11a3 3 0 0 1 0 6H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M6 4L3 7l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tooltip">Undo</span>
      </button>
      <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 7H5a3 3 0 0 0 0 6h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 4l3 3-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tooltip">Redo</span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="btn-zoom-out" title="Zoom out (-)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="10" y1="10" x2="13" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <span id="zoom-display" title="Click to reset to 100%">100%</span>
      <button class="zoom-btn" id="btn-zoom-in" title="Zoom in (+)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="4" x2="6" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="10" y1="10" x2="13" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <button class="zoom-btn" id="btn-zoom-fit-width" title="Fit width (W)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 4V2h2M11 2h2v2M1 10v2h2M11 12h2v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2"/></svg>
      </button>
      <button class="zoom-btn" id="btn-zoom-fit-page" title="Fit page (F)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 4V2h2M11 2h2v2M1 10v2h2M11 12h2v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2"/></svg>
      </button>
      <button class="zoom-btn" id="btn-zoom-100" title="Actual size (1)">1:1</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Right actions -->
    <div class="tb-actions">
      <button class="btn-action" id="btn-clear">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 1.5l10 10M11.5 1.5l-10 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Clear
      </button>
      <button class="btn-action" id="btn-copy-anno">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 9V2a1 1 0 0 1 1-1h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Copy
      </button>
      <button class="btn-action primary" id="btn-save-anno">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M4 5.5l2.5 2.5L9 5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Save PNG
      </button>
    </div>
  </div>

  <!-- ── Canvas area ── -->
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="base-canvas"></canvas>
      <canvas id="anno-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>
  </div>

  <!-- ── Status bar ── -->
  <div id="statusbar">
    <span id="sb-tool">Tool: Pen</span>
    <span id="sb-color">
      <span id="sb-color-dot" style="width:10px;height:10px;border-radius:50%;display:inline-block;background:#FF3B5C;border:1px solid rgba(255,255,255,.2)"></span>
      #FF3B5C
    </span>
    <span id="sb-size">Size: 3px</span>
    <span id="sb-dims"></span>
    <span id="sb-zoom">Zoom: 100%</span>
    <span id="sb-pos">—</span>
  </div>
</div>

<!-- Text input overlay -->
<div id="text-overlay" style="display:none;position:fixed;z-index:100;">
  <textarea id="text-input" style="
    background: rgba(14,15,17,.9); color: var(--text); border: 1.5px solid var(--accent);
    border-radius: 6px; padding: 6px 8px; font-family: var(--font); font-size: 16px;
    resize: none; outline: none; min-width: 120px; min-height: 36px;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
  " placeholder="Type and press Enter…"></textarea>
</div>

<div id="toast"></div>

<script src="../lib/db.js"></script>
<script src="annotate.js"></script>
</body>
</html>
