<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PageSnap — Trim Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1d2026;
      --surface3: #252830;
      --border: rgba(255,255,255,.07);
      --border2: rgba(255,255,255,.14);
      --text: #f0f0f2;
      --muted: rgba(240,240,242,.45);
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,.12);
      --danger: #ff4466;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

    #app { display: none; flex-direction: column; height: 100vh; }

    /* ── Toolbar ── */
    #toolbar {
      height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
    }
    .tb-logo { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 800; color: var(--accent); }
    #video-title { font-family: var(--mono); font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40vw; }
    .tb-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .btn-action {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--font); font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: all 140ms;
    }
    .btn-action:hover { background: var(--surface3); }
    .btn-action.primary { background: var(--accent); color: #0a0b0d; border-color: var(--accent); box-shadow: 0 0 12px rgba(0,229,160,.2); }
    .btn-action.primary:hover { opacity: .88; }
    .btn-action:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Stage ── */
    #stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #080909;
      background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 20px 20px;
      padding: 24px; min-height: 0;
    }
    #video {
      max-width: 100%; max-height: 100%;
      border-radius: 8px; box-shadow: 0 8px 48px rgba(0,0,0,.6);
      background: #000;
    }

    /* ── Controls panel ── */
    #controls {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 16px 24px 20px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 14px;
    }

    .time-row {
      display: flex; align-items: center; gap: 16px;
      font-family: var(--mono); font-size: 12px;
    }
    .time-chip { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .time-chip b { color: var(--text); font-weight: 500; }
    .time-chip.trim b { color: var(--accent); }
    #current-time { margin-left: auto; color: var(--muted); }

    /* ── Timeline ── */
    #timeline {
      position: relative; height: 44px;
      border-radius: 8px; background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer; user-select: none; touch-action: none;
    }
    #tl-selection {
      position: absolute; top: 0; bottom: 0;
      background: var(--accent-dim);
      border-top: 2px solid var(--accent); border-bottom: 2px solid var(--accent);
      pointer-events: none;
    }
    .tl-handle {
      position: absolute; top: -6px; bottom: -6px; width: 14px;
      background: var(--accent); border-radius: 4px;
      cursor: ew-resize; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      transform: translateX(-50%);
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .tl-handle::after {
      content: ''; width: 2px; height: 14px; background: rgba(0,0,0,.4); border-radius: 1px;
    }
    #tl-playhead {
      position: absolute; top: -3px; bottom: -3px; width: 2px;
      background: #fff; z-index: 2; pointer-events: none;
      box-shadow: 0 0 6px rgba(255,255,255,.6);
    }

    /* ── Transport ── */
    .transport { display: flex; align-items: center; gap: 8px; }
    .btn-ctrl {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 7px 12px; border-radius: 8px; cursor: pointer; transition: all 140ms;
    }
    .btn-ctrl:hover { background: var(--surface3); }
    .hint { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--muted); }

    /* ── Export progress ── */
    #export-overlay {
      position: fixed; inset: 0; background: rgba(8,9,9,.85);
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 50; backdrop-filter: blur(4px);
    }
    #export-overlay.show { display: flex; }
    #export-overlay p { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .export-bar { width: 320px; height: 6px; border-radius: 99px; background: var(--surface3); overflow: hidden; }
    #export-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; transition: width 200ms linear; }

    /* ── Loading / error ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; font-size: 14px; color: var(--muted); z-index: 40;
    }
    .spinner {
      width: 32px; height: 32px; border: 2px solid var(--surface3);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 7px 16px; border-radius: 99px; z-index: 999;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transition: opacity 200ms; opacity: 0; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Loading video…</span></div>

<div id="app">
  <div id="toolbar">
    <div class="tb-logo">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="1" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="11" cy="11" r="4" fill="currentColor"/>
        <circle cx="17" cy="5" r="1.5" fill="var(--accent)"/>
      </svg>
      Trim
    </div>
    <span id="video-title">Screen Recording</span>
    <div class="tb-actions">
      <button class="btn-action" id="btn-download-original">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M4 5.5l2.5 2.5L9 5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Original
      </button>
      <button class="btn-action primary" id="btn-export">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="3.5" cy="4" r="1.8" stroke="currentColor" stroke-width="1.2"/><circle cx="3.5" cy="10" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M5 5l7 6M5 9l7-6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Export Trimmed
      </button>
    </div>
  </div>

  <div id="stage">
    <video id="video" playsinline></video>
  </div>

  <div id="controls">
    <div class="time-row">
      <span class="time-chip">Start <b id="lbl-start">0:00.0</b></span>
      <span class="time-chip">End <b id="lbl-end">0:00.0</b></span>
      <span class="time-chip trim">Trimmed length <b id="lbl-length">0:00.0</b></span>
      <span id="current-time">0:00.0</span>
    </div>

    <div id="timeline">
      <div id="tl-selection"></div>
      <div class="tl-handle" id="handle-start" title="Drag to set start"></div>
      <div class="tl-handle" id="handle-end" title="Drag to set end"></div>
      <div id="tl-playhead"></div>
    </div>

    <div class="transport">
      <button class="btn-ctrl" id="btn-play">
        <svg id="ic-play" width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>
        <svg id="ic-pause" width="12" height="12" viewBox="0 0 14 14" fill="none" style="display:none"><rect x="3" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="8" y="2" width="3" height="10" rx="1" fill="currentColor"/></svg>
        <span id="btn-play-label">Play selection</span>
      </button>
      <button class="btn-ctrl" id="btn-set-start" title="Set start to playhead (I)">⇤ Set start</button>
      <button class="btn-ctrl" id="btn-set-end" title="Set end to playhead (O)">Set end ⇥</button>
      <button class="btn-ctrl" id="btn-reset" title="Reset trim">Reset</button>
      <span class="hint">Space = play · I / O = set start / end · Export re-encodes in real time</span>
    </div>
  </div>
</div>

<div id="export-overlay">
  <div class="spinner"></div>
  <p id="export-label">Exporting… the trimmed section plays through once to re-encode.</p>
  <div class="export-bar"><div id="export-fill"></div></div>
  <button class="btn-action" id="btn-cancel-export">Cancel</button>
</div>

<div id="toast"></div>

<script src="../lib/db.js"></script>
<script src="editor.js"></script>
</body>
</html>
